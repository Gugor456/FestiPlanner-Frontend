name: Deploy Pipeline

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'develop' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image (with env-aware base path)
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            docker build --build-arg VITE_BASE_PATH=/ -t festiplanner-frontend .
          else
            docker build --build-arg VITE_BASE_PATH=/dev/ -t festiplanner-frontend .
          fi

      - name: Save Docker image
        run: docker save festiplanner-frontend > image.tar

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.HOST }}" >> ~/.ssh/known_hosts

      - name: Upload image to VM
        run: |
          scp -i ~/.ssh/id_rsa image.tar ${{ secrets.USER }}@${{ secrets.HOST }}:/home/ubuntu/

      - name: Deploy container on VM
        run: |
          BRANCH="${{ github.ref_name }}"

          ssh -i ~/.ssh/id_rsa ${{ secrets.USER }}@${{ secrets.HOST }} << EOF

            docker load < /home/ubuntu/image.tar

            BRANCH="${BRANCH}"

            if [ "$BRANCH" = "main" ]; then

              docker rm -f festiplanner-prod || true

              docker run -d \
                --restart unless-stopped \
                -p 3000:80 \
                --name festiplanner-prod \
                festiplanner-frontend

            elif [ "$BRANCH" = "develop" ]; then

              docker rm -f festiplanner-dev || true

              docker run -d \
                --restart unless-stopped \
                -p 8080:80 \
                --name festiplanner-dev \
                festiplanner-frontend

            fi

          EOF