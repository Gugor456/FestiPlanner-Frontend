name: Deploy Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    environment:
      name: dev

    steps:
      - name: Download CI artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist
          run-id: ${{ github.event.workflow_run.id }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          printf "%s" "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -H "${{ secrets.HOST }}" >> ~/.ssh/known_hosts

      - name: Upload artifact to VM
        run: |
          scp -i ~/.ssh/id_rsa -r dist ${{ secrets.USER }}@${{ secrets.HOST }}:/home/ubuntu/frontend-dist

      - name: Deploy on VM
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.USER }}@${{ secrets.HOST }} << 'EOF'

            BRANCH="${GITHUB_REF##*/}"

            if [ "$BRANCH" = "main" ]; then
              PORT=80
              NAME=festiplanner-prod
            else
              PORT=3000
              NAME=festiplanner-dev
            fi

            docker stop $NAME || true
            docker rm $NAME || true

            docker run -d \
              --restart unless-stopped \
              -p $PORT:80 \
              --name $NAME \
              nginx:alpine

          EOF