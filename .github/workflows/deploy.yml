name: Deploy Pipeline

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t festiplanner-frontend .

      - name: Save Docker image
        run: docker save festiplanner-frontend > image.tar

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Upload image
        run: |
          scp image.tar ${{ secrets.USER }}@${{ secrets.HOST }}:/home/ubuntu/

      - name: Deploy container
        run: |
          ssh ${{ secrets.USER }}@${{ secrets.HOST }} << 'EOF'

            docker load < image.tar

            if [ "${GITHUB_REF##*/}" = "main" ]; then
              docker stop festiplanner-prod || true
              docker rm festiplanner-prod || true

              docker run -d \
                -p 80:80 \
                --name festiplanner-prod \
                festiplanner-frontend

            else
              docker stop festiplanner-dev || true
              docker rm festiplanner-dev || true

              docker run -d \
                -p 3000:80 \
                --name festiplanner-dev \
                festiplanner-frontend
            fi

          EOF