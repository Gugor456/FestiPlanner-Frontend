name: Deploy Frontend (PROD)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VITE_BASE_PATH=/ \
            -t festiplanner-frontend-prod:${{ github.sha }} .

      - name: Save Docker image
        run: docker save festiplanner-frontend-prod:${{ github.sha }} > image.tar

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.HOST }}" >> ~/.ssh/known_hosts

      - name: Upload image to VM
        run: |
          scp -i ~/.ssh/id_rsa image.tar ${{ secrets.USER }}@${{ secrets.HOST }}:/home/ubuntu/

      - name: Deploy container
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.USER }}@${{ secrets.HOST }} << EOF

            docker load < /home/ubuntu/image.tar

            docker rm -f festiplanner-prod || true

            docker run -d \
              --restart unless-stopped \
              -p 3000:80 \
              --name festiplanner-prod \
              festiplanner-frontend-prod:${{ github.sha }}

          EOF