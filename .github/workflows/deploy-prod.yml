name: Deploy Frontend (PROD)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t festiplanner-frontend-prod:${{ github.sha }} .

      - name: SSH setup
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          docker save festiplanner-frontend-prod:${{ github.sha }} > image.tar

          scp -i ~/.ssh/id_rsa image.tar ${{ secrets.USER }}@${{ secrets.HOST }}:/home/ubuntu/

          ssh -i ~/.ssh/id_rsa ${{ secrets.USER }}@${{ secrets.HOST }} << EOF

            docker load < /home/ubuntu/image.tar

            docker stop festiplanner-frontend-prod || true
            docker rm festiplanner-frontend-prod || true

            docker run -d \
              --name festiplanner-frontend-prod \
              --restart unless-stopped \
              -p 3000:80 \
              festiplanner-frontend-prod:${{ github.sha }}

          EOF